<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Замеры тела</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Табы -->
    <nav class="tabs" id="tabs">
      <button class="tab active" data-view="add">➕ Замер</button>
      <button class="tab" data-view="charts">📈 Графики</button>
      <button class="tab" data-view="history">📋 История</button>
    </nav>

    <!-- ===== Экран: Добавить замер ===== -->
    <section class="view active" id="view-add">
      <div class="card">
        <label class="field">
          <span class="field-label">Дата замера</span>
          <input type="date" id="entry-date" />
        </label>
        <div id="metric-inputs" class="metric-grid"></div>
        <p class="hint">Заполни любые поля — пустые просто не сохранятся.</p>
      </div>
    </section>

    <!-- ===== Экран: Графики ===== -->
    <section class="view" id="view-charts">
      <div class="metric-chips" id="metric-chips"></div>
      <div class="card chart-card">
        <div class="chart-head">
          <h2 id="chart-title">Вес</h2>
          <div class="trend-badge" id="trend-badge">—</div>
        </div>
        <div class="chart-wrap">
          <canvas id="chart"></canvas>
        </div>
        <div class="stats-row" id="stats-row"></div>
      </div>
    </section>

    <!-- ===== Экран: История ===== -->
    <section class="view" id="view-history">
      <div id="history-list"></div>
    </section>
  </div>

  <div id="toast" class="toast"></div>

  <script src="js/metrics.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
