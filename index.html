<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Замеры тела</title>

  <!-- PWA / добавление на экран «Домой» в iPhone -->
  <meta name="theme-color" content="#17212b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Замеры" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json" />

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Табы -->
    <nav class="tabs" id="tabs">
      <button class="tab active" data-view="report">🎯 Отчёт</button>
      <button class="tab" data-view="add">➕ Замер</button>
      <button class="tab" data-view="charts">📈 Графики</button>
      <button class="tab" data-view="history">📋 История</button>
    </nav>

    <!-- ===== Экран: Отчёт (цель по весу) ===== -->
    <section class="view active" id="view-report">
      <div id="dashboard"></div>

      <!-- Панель настройки цели (скрыта по умолчанию) -->
      <div class="goal-panel" id="goal-panel" hidden>
        <div class="card">
          <div class="card-head">
            <h2 id="goal-panel-title">Цель по весу</h2>
            <button class="icon-btn" data-action="close-goal" title="Закрыть">✕</button>
          </div>
          <label class="field">
            <span class="field-label">Рост, см (для расчёта ИМТ)</span>
            <input type="number" inputmode="decimal" step="0.1" min="0" id="g-height" placeholder="например, 165" />
          </label>
          <label class="field">
            <span class="field-label">Стартовый вес, кг</span>
            <input type="number" inputmode="decimal" step="0.1" min="0" id="g-start" placeholder="авто по первому замеру" />
          </label>
          <label class="field">
            <span class="field-label">Стартовая дата (начало пути)</span>
            <input type="date" id="g-startdate" />
          </label>
          <label class="field">
            <span class="field-label">Целевой вес, кг</span>
            <input type="number" inputmode="decimal" step="0.1" min="0" id="g-target" placeholder="например, 80" />
          </label>
          <label class="field">
            <span class="field-label">Количество этапов</span>
            <input type="number" inputmode="numeric" step="1" min="1" max="20" id="g-stages" placeholder="8" />
          </label>
          <label class="field">
            <span class="field-label">Дата события (необязательно)</span>
            <input type="date" id="g-date" />
          </label>
          <label class="field">
            <span class="field-label">Название события (необязательно)</span>
            <input type="text" id="g-event" placeholder="например, День свадьбы" maxlength="40" />
          </label>
          <button class="btn-primary" data-action="save-goal">Сохранить цель</button>
          <button class="btn-danger-ghost" data-action="delete-goal" id="btn-delete-goal" hidden>Удалить цель</button>
        </div>
      </div>
    </section>

    <!-- ===== Экран: Добавить замер ===== -->
    <section class="view" id="view-add">
      <div class="card">
        <label class="field">
          <span class="field-label">Дата замера</span>
          <input type="date" id="entry-date" />
        </label>
        <div id="metric-inputs" class="metric-grid"></div>
        <p class="hint">Заполни любые поля — пустые просто не сохранятся.</p>
        <button class="btn-primary" id="save-entry-btn" hidden>Сохранить замер</button>
      </div>
    </section>

    <!-- ===== Экран: Графики ===== -->
    <section class="view" id="view-charts">
      <div class="metric-chips" id="metric-chips"></div>
      <div class="card chart-card">
        <div class="chart-head">
          <h2 id="chart-title">Вес</h2>
          <div class="trend-badge" id="trend-badge">—</div>
        </div>
        <div class="chart-wrap">
          <canvas id="chart"></canvas>
        </div>
        <div class="stats-row" id="stats-row"></div>
      </div>
    </section>

    <!-- ===== Экран: История ===== -->
    <section class="view" id="view-history">
      <div id="history-list"></div>
    </section>
  </div>

  <div id="toast" class="toast"></div>

  <script src="js/metrics.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/goal.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
